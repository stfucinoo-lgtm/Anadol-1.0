<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بوابة الحسابات والإدارة | دوري الأناضول</title>
  
  <!-- استيراد الخطوط العربية المتناسقة مع هوية الدوري -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- التنسيق العام للموقع المشتمل على كلاسات المصادقة المحسنة -->
  <link rel="stylesheet" href="/css/style.css">
  
  <style>
    /* خط مخصص وتعديلات خفيفة لتنسيق الصفحة السحابية وتأثيرات الإضاءة الخلفية */
    body {
      font-family: 'Cairo', sans-serif;
      margin: 0;
      background-color: var(--primary-dark);
    }

    /* كرات الإضاءة الجمالية المتوهجة في الخلفية الرياضية */
    .accent-glow {
      position: absolute;
      width: 300px;
      height: 300px;
      background: var(--accent-color);
      filter: blur(140px);
      opacity: 0.08;
      border-radius: 50%;
      z-index: 1;
      pointer-events: none;
    }

    /* كلاسات التحكم في الإخفاء والظهور عند تبديل النماذج */
    .hidden {
      display: none !important;
    }
    
    .hidden-form {
      display: none !important;
    }

    /* تهيئة الكرت للتأثير الحركي الأولي عبر GSAP */
    .opacity-0 {
      opacity: 0;
    }
    .translate-y-6 {
      transform: translateY(24px);
    }
  </style>
</head>
<body>

  <!-- كرات الإضاءة الجمالية في الخلفية المظلمة -->
  <div class="accent-glow" style="top: 10%; right: 10%;"></div>
  <div class="accent-glow" style="bottom: 10%; left: 10%;"></div>

  <div class="auth-page-wrapper" style="position: relative; z-index: 2;">
    
    <!-- كارد تسجيل الدخول والإنشاء الرئيسي -->
    <div class="auth-card opacity-0 translate-y-6" id="login-box">
      
      <!-- الهيكل العلوي والأيقونة التعبيرية للموقع -->
      <div class="auth-header">
        <div class="auth-icon">🏆</div>
        <h1 class="auth-title" id="portal-title">دوري الأناضول الرياضي</h1>
        <p class="auth-subtitle" id="portal-desc">بوابة الإدارة والتنسيق الفني للمشروع</p>
      </div>

      <!-- صندوق رسائل الأخطاء والتنبيهات الموحد والمنسق بشكل بارز وأنيق -->
      <div id="error-container" class="auth-alert hidden">
        <span>⚠️</span> <span id="error-text"></span>
      </div>

      <!-- أولاً: نموذج تسجيل الدخول المحدث -->
      <form id="admin-login-form">
        <div class="auth-form-group">
          <label for="email" class="auth-label">البريد الإلكتروني</label>
          <input type="email" id="email" required placeholder="name@anadol.com" class="auth-input">
        </div>

        <div class="auth-form-group">
          <label for="password" class="auth-label">كلمة المرور</label>
          <input type="password" id="password" required placeholder="••••••••" class="auth-input">
        </div>

        <button type="submit" id="login-submit-btn" class="auth-submit-btn">
          دخول لوحة التحكم
        </button>

        <div class="auth-footer-links">
          <p class="auth-footer-link">
            ليس لديك حساب؟ 
            <a href="#" id="toggle-to-register" class="auth-footer-link"><strong>إنشاء حساب زائر جديد</strong></a>
          </p>
        </div>
      </form>

      <!-- ثانياً: نموذج إنشاء الحساب الجديد المنسق (مخفي افتراضياً) -->
      <form id="admin-register-form" class="hidden-form">
        <div class="auth-form-group">
          <label for="reg-username" class="auth-label">اسم المستخدم</label>
          <input type="text" id="reg-username" required placeholder="مثال: user123" class="auth-input">
        </div>

        <div class="auth-form-group">
          <label for="reg-email" class="auth-label">البريد الإلكتروني</label>
          <input type="email" id="reg-email" required placeholder="example@domain.com" class="auth-input">
        </div>

        <div class="auth-form-group">
          <label for="reg-password" class="auth-label">كلمة المرور</label>
          <input type="password" id="reg-password" required placeholder="••••••••" class="auth-input">
        </div>

        <button type="submit" id="register-submit-btn" class="auth-submit-btn">
          إنشاء الحساب والانضمام
        </button>

        <div class="auth-footer-links">
          <p class="auth-footer-link">
            لديك حساب بالفعل؟ 
            <a href="#" id="toggle-to-login" class="auth-footer-link"><strong>تسجيل الدخول</strong></a>
          </p>
        </div>
      </form>

      <!-- رابط العودة إلى الموقع الرئيسي للدوري بشكل مريح ومتناسق -->
      <div class="auth-footer-links" style="margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
        <a href="../index.html" class="auth-footer-link" style="color: var(--accent-color); font-weight: 700;">
          ← عودة للموقع الرئيسي للدوري
        </a>
      </div>

    </div>
  </div>

  <!-- مكتبة GSAP للحركات البصرية الناعمة -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  
  <!-- ملفات الخدمات والربط البرمجي المشتركة لربط الـ API -->
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // تشغيل الحركات البصرية اللطيفة عند تحميل الصفحة بنجاح
      if (typeof gsap !== 'undefined') {
        gsap.to('#login-box', {
          opacity: 1,
          y: 0,
          duration: 0.8,
          ease: 'power3.out'
        });
      } else {
        document.getElementById('login-box').classList.remove('opacity-0', 'translate-y-6');
      }
    });
  </script>
</body>
</html>
